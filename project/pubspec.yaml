name: humtemp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  firebase_database: ^12.0.2
  flutter_local_notifications: ^17.2.4
  permission_handler: ^11.3.1
  emailjs: ^4.0.0
  fl_chart: ^0.69.0
  onesignal_flutter: ^5.2.5
  http: ^1.2.1
  csv: ^6.0.0
  path_provider: ^2.1.2
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/